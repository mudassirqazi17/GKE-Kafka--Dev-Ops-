apiVersion: apps/v1
kind: Deployment
metadata:
  name: apicurio-registry
  namespace: kafka
spec:
  replicas: 2

  selector:
    matchLabels:
      app: apicurio-registry

  template:
    metadata:
      labels:
        app: apicurio-registry

    spec:
      containers:
      - name: registry
        image: apicurio/apicurio-registry:3.0.7

        ports:
        - containerPort: 8080

        env:
        - name: APICURIO_STORAGE_KIND
          value: sql

        - name: APICURIO_DATASOURCE_URL
          value: jdbc:h2:mem:registry
